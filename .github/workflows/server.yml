name: Server CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**' # Only trigger if files in the server directory change
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'

jobs:
  check-server:
    runs-on: ubuntu-latest
    
    # Execute all subsequent commands inside the 'server' directory
    defaults:
      run:
        working-directory: ./server

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './server/package-lock.json'
    
    - name: Install Dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
